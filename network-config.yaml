          - name: TGWRoute
            type: transitGateway
            destination: 10.192.0.0/10
            target: Network-Main
          - name: EndpointsRoute
            type: gatewayEndpoint
            target: s3
          - name: InternetRoute
            type: natGateway
            destination: 0.0.0.0/0
            target: sharedservices-nat-gw-a
      - name: sharedservices-private-b
        routes:
