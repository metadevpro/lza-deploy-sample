homeRegion: &HOME_REGION eu-south-2
#####################################
# Delete default VPCs-- use this    #
# object to delete default VPCs in  #
# any non-excluded accounts         #
#####################################
defaultVpc:
  delete: true
  excludeAccounts: []

#####################################
# Transit Gateways-- use this object #
# to deploy transit gateways         #
#####################################
transitGateways:
  - name: Network-Main
    account: Network
    region: *HOME_REGION
    shareTargets:
      organizationalUnits:
        - Security
        - Infrastructure
        - Workloads
    asn: 65521
    dnsSupport: enable
    vpnEcmpSupport: enable
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    routeTables:
      - name: Network-Main-Core
        routes: []
      - name: Network-Main-Segregated
        routes: []
      - name: Network-Main-Shared
        routes: []
      - name: Network-Main-Standalone
        routes: []

#####################################
# Central network services -- use   #
# this object to define a delegated  #
# admin account and configure        #
# advanced networking services      #
#####################################
centralNetworkServices:
  delegatedAdminAccount: Network

#####################################
# Endpoint policies -- use this     #
# object to define standard policies #
# for VPC endpoints                 #
#####################################
endpointPolicies:
  - name: Default
    document: vpc-endpoint-policies/default.json
  - name: Ec2
    document: vpc-endpoint-policies/ec2.json

#####################################
# VPCs-- use this object to deploy  #
# a VPC in a single account and     #
# region.                           #
#####################################
vpcs:
  - name: vpc-shared-services
    account: SharedServices
    region: eu-south-2
    cidrs:
      - 10.202.0.0/16
    internetGateway: true
    enableDnsHostnames: true
    enableDnsSupport: true
    instanceTenancy: default
    routeTables:
      - name: sharedservices-public-a
        routes:
          - name: LocalRoute
            type: local
            destination: 10.202.0.0/16
          - name: TGWRoute
            type: transitGateway
            destination: 10.192.0.0/10
            target: Network-Main
          - name: EndpointsRoute
            type: gatewayEndpoint
            target: s3
          - name: InternetRoute
            type: internetGateway
            destination: 0.0.0.0/0
      - name: sharedservices-public-b
        routes:
          - name: LocalRoute
            type: local
            destination: 10.202.0.0/16
          - name: TGWRoute
