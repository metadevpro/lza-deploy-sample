      Account for networking
    email: pjmolina+networks@metadev.pro
    organizationalUnit: Infrastructure
    warm: false
  - name: SharedServices
    description: >-
      Account for Shared Services
    email: pjmolina+shared-services@metadev.pro
    organizationalUnit: Infrastructure
    warm: false
  - name: Audit
    description: >-
      Account for Audit
    email: pjmolina+audit@metadev.pro
    organizationalUnit: Security
    warm: false
  - name: LogArchive
    description: >-
      Account for Logs
    email: pjmolina+log-archive@metadev.pro
    organizationalUnit: Security
    warm: false
workloadAccounts:
  - name: Dev
    description: >-
      Account for Development
    email: pjmolina+dev@metadev.pro
    organizationalUnit: Dev
    warm: false
  - name: Staging
    description: >-
      Account for Staging
    email: pjmolina+staging@metadev.pro
    organizationalUnit: Staging
    warm: false
  - name: Production
    description: >-
      Account for Production
    email: pjmolina+production@metadev.pro
    organizationalUnit: Production
    warm: false

