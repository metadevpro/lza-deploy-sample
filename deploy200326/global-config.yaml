homeRegion: &HOME_REGION eu-south-2
enabledRegions:
  - eu-south-2
  - eu-west-1
  - us-east-1

managementAccountAccessRole: AWSControlTowerExecution
cloudwatchLogRetentionInDays: 3653
cdkOptions:
  centralizeBuckets: true
  useManagementAccessRole: true
  #skipStaticValidation: true
terminationProtection: true
snsTopics: # SecurityHub notifications
  deploymentTargets:
    organizationalUnits:
      - Workloads
      - Infrastructure
      - Security

  topics:
    - name: Security
      emailAddresses:
        - pjmolina+networks@metadev.pro
        - pjmolina+shared-services@metadev.pro
        - pjmolina+audit@metadev.pro
        - pjmolina+log-archive@metadev.pro
        - pjmolina+dev@metadev.pro
        - pjmolina+staging@metadev.pro
        - pjmolina+production@metadev.pro

controlTower:
  enable: true
  landingZone:
    version: "3.3"
    logging:
      loggingBucketRetentionDays: 365
      accessLoggingBucketRetentionDays: 3650
      organizationTrail: true
    security:
      enableIdentityCenterAccess: true
  controls: []
logging:
  account: LogArchive
  cloudtrail:
    enable: true
    organizationTrail: true
    organizationTrailSettings:
      multiRegionTrail: true
      globalServiceEvents: true
      managementEvents: true
      s3DataEvents: true
      lambdaDataEvents: true
      sendToCloudWatchLogs: true
      apiErrorRateInsight: true
      apiCallRateInsight: true
    accountTrails: []
    lifecycleRules: []
  sessionManager:
    sendToCloudWatchLogs: false
    sendToS3: true
    excludeRegions: []
    excludeAccounts: []
    lifecycleRules: []
    attachPolicyToIamRoles:
      - EC2-Default-SSM-AD-Role
  cloudwatchLogs:
    dynamicPartitioning: dynamic-partitioning/log-filters.json
    enable: true
reports:
  costAndUsageReport:
    compression: Parquet
    format: Parquet
    reportName: accelerator-cur
    s3Prefix: cur
    timeUnit: DAILY
    refreshClosedReports: true
    reportVersioning: CREATE_NEW_REPORT
backup:
  vaults:
    - name: BackupVault
      deploymentTargets:
        organizationalUnits:
          - Workloads
          - Infrastructure
          - Security

tags: []
iamRoleSsmParameters: []